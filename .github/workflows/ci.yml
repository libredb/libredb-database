name: CI

# Mirrors the local truth gate (bun run gate) on every push and PR. Needs no
# secrets, so it provides value the moment the repo lands on GitHub.
on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token (Scorecard Token-Permissions): the gate only reads the repo.
permissions:
  contents: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - id: gate
        run: bun run gate
      # Secret scan in CI too (defense-in-depth: catches anything that bypassed
      # the pre-commit hook, e.g. a --no-verify commit). secretlint is an npm
      # devDep, so no system tool is needed.
      - id: secrets
        run: bun run secrets
      # Dependency audit: kept out of the inner `gate` (which stays offline) and
      # run here + in the pre-push hook, where network access is expected. Uses
      # `bun run audit` so CI and the hook share one ignore policy (package.json).
      # Documented exception: GHSA-h67p-54hq-rp68 (js-yaml moderate ReDoS) — a
      # dev-only transitive dep (changesets -> @manypkg/get-packages ->
      # read-yaml-file@1 -> js-yaml@3), never shipped (zero runtime deps), with no
      # upstream fix yet. Remove the --ignore once @manypkg bumps read-yaml-file.
      - id: audit
        run: bun run audit
      # License tripwire: gates only RUNTIME deps (zero today). Fails if a
      # shipped dependency ever carries a non-permissive license.
      - id: license
        run: bun run license:check
      # Render a job summary on the run page (no emoji, per repo convention).
      # Bundle size is best-effort: re-measured here, shown as n/a if the build
      # did not produce dist/ (e.g. the gate failed before the build step).
      - name: Job summary
        if: always()
        run: |
          BYTES=$(bun run size --json 2>/dev/null | jq -r '.[0].size // empty' || true)
          if [ -n "$BYTES" ]; then KB=$(awk "BEGIN{printf \"%.2f\", $BYTES/1024}"); else KB="n/a"; fi
          {
            echo "## LibreDB CI"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Gate (typecheck, format, lint, knip, build, size, test) | ${{ steps.gate.outcome }} |"
            echo "| Secret scan (secretlint) | ${{ steps.secrets.outcome }} |"
            echo "| Dependency audit (bun audit) | ${{ steps.audit.outcome }} |"
            echo "| License tripwire (runtime deps) | ${{ steps.license.outcome }} |"
            echo ""
            echo "- Coverage: 100% line/function/statement (enforced by bunfig.toml)"
            echo "- Bundle: ${KB} kB (min+brotli) / 5 kB budget"
          } >> "$GITHUB_STEP_SUMMARY"

  node-smoke:
    name: node 22 smoke
    # package.json declares engines.node >= 22 and the docs advertise `npx
    # libredb` and Node embedding, but the gate runs on Bun. This job keeps the
    # Node half of the declared runtime surface off the honor system: build the
    # real dist/, then open, write, lock, reopen, and read a file-backed
    # database under Node, plus one pass of the CLI entry.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Smoke-test the built package under Node
        run: node scripts/node-smoke.mjs
