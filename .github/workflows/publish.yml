name: Publish

# Publishes to npm ONLY when a GitHub Release is published. It never runs on
# push or pull_request, so creating the tag + release is the single trigger.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      # Full verification before anything is published.
      - run: bun run gate
      # setup-node writes ~/.npmrc with the registry + a NODE_AUTH_TOKEN
      # placeholder - the canonical, injection-safe way to authenticate npm
      # publish in CI (the token is never interpolated into a shell command).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # npm publish runs prepublishOnly (build + attw + publint) automatically.
      # Provenance is intentionally omitted while the repo is private; once it is
      # public, add `--provenance` here and `id-token: write` to permissions.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}
      # Run summary on the run page (no emoji, per repo convention).
      - name: Job summary
        if: success()
        run: |
          V=$(node -p "require('./package.json').version")
          {
            echo "## Published to npm"
            echo ""
            echo "- Package: \`@libredb/libredb@${V}\`"
            echo "- [View on npm](https://www.npmjs.com/package/@libredb/libredb/v/${V})"
          } >> "$GITHUB_STEP_SUMMARY"
